# ======================================================================
#                         ZenMind Website Nginx
#                    Canonical domain: www.zenmind.cc
# ======================================================================

server {
    listen 80;
    listen [::]:80;
    server_name zenmind.cc www.zenmind.cc;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://www.zenmind.cc$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name zenmind.cc www.zenmind.cc;

    root /var/www/zenmind.cc/current/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/www.zenmind.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.zenmind.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/zenmind.cc.access.log;
    error_log /var/log/nginx/zenmind.cc.error.log warn;

    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location ^~ /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location ^~ /install/ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        default_type "text/x-shellscript; charset=utf-8";
        try_files $uri =404;
    }

    location ^~ /api/ {
        return 404;
    }

    location = /404.html {
        internal;
        try_files $uri =404;
    }

    location = /50x.html {
        internal;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
