# ======================================================================
#               ZenMind Website Nginx (Proxy to Docker Compose)
#                    Canonical domain: www.zenmind.cc
# ======================================================================

server {
    listen 80;
    listen [::]:80;
    server_name zenmind.cc www.zenmind.cc;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://www.zenmind.cc$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name zenmind.cc www.zenmind.cc;

    ssl_certificate /etc/letsencrypt/live/www.zenmind.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.zenmind.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/zenmind.cc.access.log;
    error_log /var/log/nginx/zenmind.cc.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /install/manifest.json {
        root /docker/zenmind-releases;
        try_files /manifest.json =404;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location = /install/releases/index.json {
        root /docker/zenmind-releases;
        try_files /index.json =404;
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ^~ /install/releases/ {
        alias /docker/zenmind-releases/;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location / {
        proxy_pass http://127.0.0.1:11940;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
